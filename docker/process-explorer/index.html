<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Activiti Process Explorer</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Segoe UI', Arial, sans-serif;
      background: #1e1e2e;
      color: #cdd6f4;
      height: 100vh;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    /* ── Header ── */
    header {
      background: #181825;
      border-bottom: 1px solid #313244;
      padding: 10px 16px;
      display: flex;
      align-items: center;
      gap: 12px;
      flex-shrink: 0;
    }

    header h1 {
      font-size: 16px;
      font-weight: 600;
      color: #cba6f7;
      white-space: nowrap;
    }

    .cred-group {
      display: flex;
      align-items: center;
      gap: 6px;
      margin-left: auto;
    }

    .cred-group label { font-size: 12px; color: #a6adc8; }

    .cred-group input {
      background: #313244;
      border: 1px solid #45475a;
      border-radius: 4px;
      color: #cdd6f4;
      padding: 4px 8px;
      font-size: 12px;
      width: 110px;
    }

    .cred-group input:focus { outline: none; border-color: #cba6f7; }

    button {
      background: #cba6f7;
      color: #1e1e2e;
      border: none;
      border-radius: 4px;
      padding: 5px 12px;
      font-size: 12px;
      font-weight: 600;
      cursor: pointer;
      white-space: nowrap;
    }
    button:hover { background: #b4a0f0; }
    button.secondary {
      background: #313244;
      color: #cdd6f4;
    }
    button.secondary:hover { background: #45475a; }

    .refresh-info { font-size: 11px; color: #6c7086; white-space: nowrap; }

    /* ── Main layout ── */
    .main {
      display: flex;
      flex: 1;
      overflow: hidden;
    }

    /* ── Sidebar ── */
    .sidebar {
      width: 340px;
      min-width: 240px;
      background: #181825;
      border-right: 1px solid #313244;
      display: flex;
      flex-direction: column;
      overflow: hidden;
      flex-shrink: 0;
    }

    .tab-bar {
      display: flex;
      border-bottom: 1px solid #313244;
      flex-shrink: 0;
    }

    .tab {
      flex: 1;
      padding: 8px 4px;
      text-align: center;
      font-size: 12px;
      cursor: pointer;
      color: #6c7086;
      border-bottom: 2px solid transparent;
      transition: color 0.15s;
    }

    .tab:hover { color: #cdd6f4; }
    .tab.active { color: #cba6f7; border-bottom-color: #cba6f7; }

    .badge {
      display: inline-block;
      background: #313244;
      color: #a6adc8;
      border-radius: 10px;
      padding: 1px 6px;
      font-size: 10px;
      margin-left: 4px;
      vertical-align: middle;
    }
    .tab.active .badge { background: #cba6f7; color: #1e1e2e; }

    .instance-list {
      flex: 1;
      overflow-y: auto;
      padding: 6px;
    }

    .instance-list::-webkit-scrollbar { width: 6px; }
    .instance-list::-webkit-scrollbar-track { background: #181825; }
    .instance-list::-webkit-scrollbar-thumb { background: #45475a; border-radius: 3px; }

    .instance-card {
      background: #1e1e2e;
      border: 1px solid #313244;
      border-radius: 6px;
      padding: 8px 10px;
      margin-bottom: 6px;
      cursor: pointer;
      transition: border-color 0.15s, background 0.15s;
    }

    .instance-card:hover { border-color: #7f849c; background: #252535; }
    .instance-card.selected { border-color: #cba6f7; background: #2a2a40; }

    .card-header {
      display: flex;
      align-items: center;
      gap: 6px;
      margin-bottom: 4px;
    }

    .status-dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      flex-shrink: 0;
    }
    .status-dot.running  { background: #a6e3a1; box-shadow: 0 0 4px #a6e3a1; }
    .status-dot.done     { background: #6c7086; }
    .status-dot.aborted  { background: #f38ba8; }

    .proc-name {
      font-size: 13px;
      font-weight: 600;
      color: #cdd6f4;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      flex: 1;
    }

    .status-label {
      font-size: 10px;
      padding: 1px 6px;
      border-radius: 3px;
      font-weight: 600;
      flex-shrink: 0;
    }
    .status-label.running { background: #a6e3a120; color: #a6e3a1; }
    .status-label.done    { background: #45475a50; color: #9399b2; }
    .status-label.aborted { background: #f38ba820; color: #f38ba8; }

    .card-meta {
      font-size: 11px;
      color: #6c7086;
      display: flex;
      flex-direction: column;
      gap: 2px;
    }

    .meta-row { display: flex; gap: 8px; }
    .meta-row span { white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }

    /* ── Process group header ── */
    .proc-group { margin-bottom: 10px; }

    .group-header {
      display: flex;
      align-items: center;
      gap: 6px;
      padding: 5px 8px;
      background: #313244;
      border-radius: 5px;
      cursor: pointer;
      user-select: none;
      margin-bottom: 3px;
    }
    .group-header:hover { background: #45475a; }

    .group-chevron {
      font-size: 10px;
      color: #6c7086;
      display: inline-block;
      transition: transform 0.15s;
      width: 12px;
      flex-shrink: 0;
    }
    .group-chevron.open { transform: rotate(90deg); }

    .group-key {
      font-size: 12px;
      font-weight: 700;
      color: #cba6f7;
      flex: 1;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .group-count {
      font-size: 10px;
      background: #1e1e2e;
      color: #a6adc8;
      border-radius: 10px;
      padding: 1px 7px;
      flex-shrink: 0;
    }

    /* ── Tree ── */
    .tree-root { margin-bottom: 3px; }

    .tree-children {
      border-left: 1px solid #45475a;
      margin-left: 14px;
      padding-left: 0;
    }

    .tree-child-wrap {
      position: relative;
      padding-left: 14px;
      margin-bottom: 3px;
    }

    /* horizontal connector line */
    .tree-child-wrap::before {
      content: '';
      position: absolute;
      left: 0;
      top: 18px;
      width: 12px;
      height: 1px;
      background: #45475a;
    }

    /* sub-process label */
    .sub-label {
      font-size: 10px;
      background: #45475a50;
      color: #7f849c;
      border-radius: 3px;
      padding: 0 5px;
      margin-right: 4px;
      flex-shrink: 0;
    }

    .empty-state {
      text-align: center;
      padding: 40px 16px;
      color: #6c7086;
      font-size: 13px;
    }

    /* ── Diagram panel ── */
    .diagram-panel {
      flex: 1;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    .diagram-toolbar {
      background: #181825;
      border-bottom: 1px solid #313244;
      padding: 8px 14px;
      display: flex;
      align-items: center;
      gap: 10px;
      flex-shrink: 0;
      min-height: 40px;
    }

    .diagram-title {
      font-size: 13px;
      color: #a6adc8;
      flex: 1;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .zoom-controls { display: flex; gap: 4px; }
    .zoom-controls button {
      width: 28px;
      height: 28px;
      padding: 0;
      font-size: 14px;
      font-weight: 700;
    }

    .diagram-viewport {
      flex: 1;
      overflow: auto;
      display: flex;
      align-items: flex-start;
      justify-content: flex-start;
      padding: 20px;
      background: #1e1e2e;
    }

    .diagram-viewport::-webkit-scrollbar { width: 8px; height: 8px; }
    .diagram-viewport::-webkit-scrollbar-track { background: #1e1e2e; }
    .diagram-viewport::-webkit-scrollbar-thumb { background: #45475a; border-radius: 4px; }

    #diagram-img {
      max-width: none;
      transform-origin: top left;
      transition: transform 0.15s;
      border-radius: 4px;
      box-shadow: 0 4px 20px #00000060;
      background: #fff;
    }

    .diagram-placeholder {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      color: #45475a;
      gap: 12px;
    }

    .diagram-placeholder svg { opacity: 0.3; }

    .diagram-placeholder p { font-size: 14px; }

    .spinner {
      width: 32px;
      height: 32px;
      border: 3px solid #313244;
      border-top-color: #cba6f7;
      border-radius: 50%;
      animation: spin 0.7s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    .error-msg {
      color: #f38ba8;
      font-size: 12px;
      padding: 8px 14px;
      background: #f38ba810;
      border-radius: 4px;
      margin: 8px;
    }

    /* ── Detail Panel ── */
    .detail-panel {
      background: #181825;
      border-top: 2px solid #313244;
      display: flex;
      flex-direction: column;
      height: 230px;
      flex-shrink: 0;
    }

    .detail-tab-bar {
      display: flex;
      align-items: center;
      border-bottom: 1px solid #313244;
      flex-shrink: 0;
    }

    .detail-tab {
      padding: 6px 16px;
      font-size: 12px;
      cursor: pointer;
      color: #6c7086;
      border-bottom: 2px solid transparent;
      white-space: nowrap;
    }
    .detail-tab:hover { color: #cdd6f4; }
    .detail-tab.active { color: #89b4fa; border-bottom-color: #89b4fa; }

    .detail-collapse-btn {
      margin-left: auto;
      padding: 4px 10px;
      font-size: 11px;
      color: #6c7086;
      cursor: pointer;
      user-select: none;
    }
    .detail-collapse-btn:hover { color: #cdd6f4; }

    .detail-content {
      flex: 1;
      overflow-y: auto;
      padding: 6px 10px;
    }
    .detail-content::-webkit-scrollbar { width: 6px; }
    .detail-content::-webkit-scrollbar-track { background: #181825; }
    .detail-content::-webkit-scrollbar-thumb { background: #45475a; border-radius: 3px; }

    /* Variables */
    .var-table { width: 100%; border-collapse: collapse; font-size: 12px; }
    .var-table th {
      text-align: left; color: #6c7086; font-weight: 600;
      padding: 3px 8px; border-bottom: 1px solid #313244; position: sticky; top: 0; background: #181825;
    }
    .var-table td { padding: 4px 8px; border-bottom: 1px solid #1e1e2e; vertical-align: top; }
    .var-table tr:hover td { background: #1e1e2e20; }
    .var-name  { color: #89dceb; font-family: monospace; white-space: nowrap; }
    .var-type  { color: #6c7086; font-style: italic; font-size: 11px; white-space: nowrap; }
    .var-value { color: #a6e3a1; font-family: monospace; word-break: break-all; }
    .var-value.long {
      display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical;
      overflow: hidden; cursor: pointer;
    }
    .var-value.long.expanded { display: block; }

    /* Tasks */
    .task-list { display: flex; flex-direction: column; gap: 3px; }
    .task-row {
      display: flex; align-items: center; gap: 8px;
      padding: 5px 8px; background: #1e1e2e; border-radius: 4px; font-size: 12px;
    }
    .task-row:hover { background: #252535; }
    .task-dot  { width: 7px; height: 7px; border-radius: 50%; flex-shrink: 0; }
    .task-name { flex: 1; color: #cdd6f4; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
    .task-assignee { color: #89b4fa; font-size: 11px; flex-shrink: 0; }
    .task-dur      { color: #6c7086;  font-size: 11px; flex-shrink: 0; min-width: 50px; text-align: right; }

    /* Activity History */
    .activity-list { display: flex; flex-direction: column; }
    .act-row {
      display: flex; align-items: flex-start; gap: 8px;
      padding: 3px 6px; font-size: 12px; border-radius: 3px;
    }
    .act-row:hover { background: #1e1e2e; }
    .act-icon {
      width: 20px; height: 20px; border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      font-size: 10px; flex-shrink: 0; margin-top: 2px;
    }
    .act-icon.startEvent   { background: #a6e3a120; color: #a6e3a1; border: 1px solid #a6e3a1; }
    .act-icon.endEvent     { background: #f38ba820; color: #f38ba8; border: 1px solid #f38ba8; }
    .act-icon.userTask     { background: #89b4fa20; color: #89b4fa; border: 1px solid #89b4fa; }
    .act-icon.callActivity { background: #cba6f720; color: #cba6f7; border: 1px solid #cba6f7; }
    .act-icon.gateway      { background: #f9e2af20; color: #f9e2af; border: 1px solid #f9e2af; }
    .act-icon.other        { background: #45475a;   color: #6c7086; }
    .act-body   { flex: 1; overflow: hidden; }
    .act-name   { color: #cdd6f4; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
    .act-name a { color: #cba6f7; text-decoration: none; font-size: 11px; margin-left: 8px; }
    .act-name a:hover { text-decoration: underline; }
    .act-meta   { color: #6c7086; font-size: 11px; }
    .act-dur    { color: #6c7086; font-size: 11px; flex-shrink: 0; min-width: 50px; text-align: right; }
  </style>
</head>
<body>

<header>
  <h1>⚙ Activiti Process Explorer</h1>
  <div class="cred-group">
    <label>User</label>
    <input type="text"     id="inp-user" value="kermit">
    <label>Pass</label>
    <input type="password" id="inp-pass" value="kermit">
    <label>Host</label>
    <input type="text"     id="inp-host" value="http://localhost:9090" style="width:170px">
    <button onclick="reload()">&#8635; Laden</button>
  </div>
  <span class="refresh-info" id="refresh-info"></span>
</header>

<div class="main">

  <!-- Sidebar -->
  <div class="sidebar">
    <div class="tab-bar">
      <div class="tab active" id="tab-running"  onclick="switchTab('running')">
        Laufend <span class="badge" id="badge-running">0</span>
      </div>
      <div class="tab" id="tab-history" onclick="switchTab('history')">
        Historie <span class="badge" id="badge-history">0</span>
      </div>
      <div class="tab" id="tab-all"     onclick="switchTab('all')">
        Alle <span class="badge" id="badge-all">0</span>
      </div>
    </div>
    <div class="instance-list" id="instance-list">
      <div class="empty-state">Bitte auf "Laden" klicken</div>
    </div>
  </div>

  <!-- Diagram -->
  <div class="diagram-panel">
    <div class="diagram-toolbar">
      <span class="diagram-title" id="diagram-title">Kein Prozess ausgewählt</span>
      <div class="zoom-controls">
        <button class="secondary" onclick="zoom(-0.2)" title="Verkleinern">−</button>
        <button class="secondary" onclick="zoom(0)"   title="Zurücksetzen">1:1</button>
        <button class="secondary" onclick="zoom(+0.2)" title="Vergrößern">+</button>
        <button class="secondary" onclick="fitToView()" title="Einpassen">⤢</button>
      </div>
    </div>

    <div class="diagram-viewport" id="diagram-viewport">
      <div class="diagram-placeholder" id="diagram-placeholder">
        <svg width="64" height="64" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
          <rect x="3" y="3" width="18" height="18" rx="2"/>
          <path d="M8 12h8M12 8v8"/>
        </svg>
        <p>Prozessinstanz aus der Liste auswählen</p>
      </div>
      <img id="diagram-img" style="display:none" alt="Prozessdiagramm">
    </div>

    <div class="detail-panel" id="detail-panel" style="display:none">
      <div class="detail-tab-bar">
        <div class="detail-tab active" id="dtab-vars"       onclick="switchDetailTab('vars')">Variablen</div>
        <div class="detail-tab"        id="dtab-tasks"      onclick="switchDetailTab('tasks')">Tasks</div>
        <div class="detail-tab"        id="dtab-activities" onclick="switchDetailTab('activities')">Verlauf</div>
        <span class="detail-collapse-btn" id="detail-collapse-btn" onclick="toggleDetailPanel()">▼ einklappen</span>
      </div>
      <div class="detail-content" id="detail-content"></div>
    </div>
  </div>

</div>

<script>
  // ── State ──────────────────────────────────────────────────────────────────
  let allInstances    = [];   // combined running + historic
  let currentTab      = 'running';
  let selectedId      = null;
  let currentScale    = 1.0;
  let refreshTimer    = null;
  let autoRefreshSec  = 15;
  let countdown       = autoRefreshSec;
  let collapsedGroups  = new Set();  // process keys that are collapsed
  let currentDetailTab = 'vars';
  let detailCache      = new Map();  // instanceId → {vars, tasks, activities}
  let detailPanelOpen  = true;

  // ── Helpers ────────────────────────────────────────────────────────────────
  function base64(user, pass) {
    return btoa(unescape(encodeURIComponent(user + ':' + pass)));
  }

  function creds() {
    return {
      user: document.getElementById('inp-user').value,
      pass: document.getElementById('inp-pass').value,
      host: document.getElementById('inp-host').value.replace(/\/$/, '')
    };
  }

  function authHeader() {
    const c = creds();
    return { 'Authorization': 'Basic ' + base64(c.user, c.pass) };
  }

  async function apiFetch(path) {
    const c = creds();
    const url = c.host + path;
    const resp = await fetch(url, { headers: authHeader() });
    if (!resp.ok) throw new Error(`HTTP ${resp.status} – ${resp.statusText}`);
    return resp.json();
  }

  function formatDate(iso) {
    if (!iso) return '–';
    const d = new Date(iso);
    return d.toLocaleDateString('de-DE') + ' ' +
           d.toLocaleTimeString('de-DE', { hour: '2-digit', minute: '2-digit', second: '2-digit' });
  }

  function parseDuration(ms) {
    if (!ms && ms !== 0) return '–';
    const s = Math.floor(ms / 1000);
    if (s < 60)   return s + ' s';
    if (s < 3600) return Math.floor(s/60) + ' min ' + (s%60) + ' s';
    return Math.floor(s/3600) + ' h ' + Math.floor((s%3600)/60) + ' min';
  }

  function procKey(defId) {
    // "GEE-TestAutomationProcess:1:34058" → "GEE-TestAutomationProcess"
    return defId ? defId.split(':')[0] : defId;
  }

  // ── Load instances ─────────────────────────────────────────────────────────
  async function reload() {
    clearAutoRefresh();
    showListLoading();

    try {
      const [runtimeResp, histResp] = await Promise.all([
        apiFetch('/activiti-rest/service/runtime/process-instances?size=200'),
        apiFetch('/activiti-rest/service/history/historic-process-instances?size=200&order=desc&sort=processInstanceId')
      ]);

      const runningIds = new Set(runtimeResp.data.map(i => i.id));

      // Mark running instances
      const running = runtimeResp.data.map(i => ({
        ...i,
        status: 'running',
        isHistoric: false
      }));

      // Historic: skip those already in runtime (avoid duplicates)
      const historic = histResp.data
        .filter(i => !runningIds.has(i.id))
        .map(i => ({
          ...i,
          status: i.deleteReason ? 'aborted' : 'done',
          isHistoric: true
        }));

      allInstances = [...running, ...historic];

      updateBadges();
      renderList();
      startAutoRefresh();

    } catch (e) {
      document.getElementById('instance-list').innerHTML =
        `<div class="error-msg">Fehler: ${e.message}</div>`;
    }
  }

  function showListLoading() {
    document.getElementById('instance-list').innerHTML =
      '<div class="empty-state"><div class="spinner" style="margin:0 auto"></div></div>';
  }

  // ── Tabs ───────────────────────────────────────────────────────────────────
  function switchTab(tab) {
    currentTab = tab;
    ['running','history','all'].forEach(t => {
      document.getElementById('tab-' + t).classList.toggle('active', t === tab);
    });
    renderList();
  }

  function updateBadges() {
    const running = allInstances.filter(i => i.status === 'running').length;
    const hist    = allInstances.filter(i => i.status !== 'running').length;
    document.getElementById('badge-running').textContent = running;
    document.getElementById('badge-history').textContent = hist;
    document.getElementById('badge-all').textContent     = allInstances.length;
  }

  // ── Render list (grouped + tree) ──────────────────────────────────────────
  function renderList() {
    const container = document.getElementById('instance-list');

    // Only root processes drive the tab filter
    const roots = allInstances.filter(i => !i.superProcessInstanceId);
    const filteredRoots = roots.filter(i => {
      if (currentTab === 'running') return i.status === 'running';
      if (currentTab === 'history') return i.status !== 'running';
      return true;
    });

    if (filteredRoots.length === 0) {
      const msgs = {
        running: 'Keine laufenden Prozesse',
        history: 'Keine abgeschlossenen Prozesse',
        all:     'Keine Prozesse gefunden'
      };
      container.innerHTML = `<div class="empty-state">${msgs[currentTab]}</div>`;
      return;
    }

    // Build lookup: parentId → children[]
    const childrenOf = new Map();
    allInstances.forEach(i => {
      if (i.superProcessInstanceId) {
        if (!childrenOf.has(i.superProcessInstanceId))
          childrenOf.set(i.superProcessInstanceId, []);
        childrenOf.get(i.superProcessInstanceId).push(i);
      }
    });

    // Group roots by process key (preserving insertion order = newest first)
    const groups = new Map();
    for (const inst of filteredRoots) {
      const key = procKey(inst.processDefinitionId);
      if (!groups.has(key)) groups.set(key, []);
      groups.get(key).push(inst);
    }

    let html = '';
    for (const [key, groupRoots] of groups) {
      const collapsed = collapsedGroups.has(key);

      // Status summary for group count badge
      const nRun = groupRoots.filter(i => i.status === 'running').length;
      const countLabel = nRun > 0
        ? `${groupRoots.length} | <span style="color:#a6e3a1">${nRun} läuft</span>`
        : `${groupRoots.length}`;

      html += `
        <div class="proc-group">
          <div class="group-header" onclick="toggleGroup('${key}')">
            <span class="group-chevron ${collapsed ? '' : 'open'}">&#9658;</span>
            <span class="group-key" title="${key}">${key}</span>
            <span class="group-count">${countLabel}</span>
          </div>`;

      if (!collapsed) {
        html += '<div class="group-body">';
        for (const root of groupRoots) {
          html += `<div class="tree-root">${renderCard(root, false)}</div>`;

          const children = childrenOf.get(root.id) || [];
          if (children.length > 0) {
            html += '<div class="tree-children">';
            children.forEach((child, idx) => {
              html += `<div class="tree-child-wrap">${renderCard(child, true)}</div>`;
            });
            html += '</div>';
          }
        }
        html += '</div>';
      }

      html += '</div>';
    }

    container.innerHTML = html;
  }

  function renderCard(inst, isSub) {
    const key    = procKey(inst.processDefinitionId);
    const dotCls = inst.status;
    const lblTxt = inst.status === 'running' ? 'LÄUFT' :
                   inst.status === 'aborted'  ? 'ABBRUCH' : 'FERTIG';
    const user   = inst.startUserId || '–';
    const dur    = inst.durationInMillis != null ? parseDuration(inst.durationInMillis) : '–';
    const started = formatDate(inst.startTime);
    const subLbl = isSub ? '<span class="sub-label">SUB</span>' : '';

    return `
      <div class="instance-card ${selectedId === inst.id ? 'selected' : ''}"
           onclick="selectInstance('${inst.id}')">
        <div class="card-header">
          <div class="status-dot ${dotCls}"></div>
          ${subLbl}
          <span class="proc-name" title="${key}">${isSub ? key : '#' + inst.id}</span>
          <span class="status-label ${dotCls}">${lblTxt}</span>
        </div>
        <div class="card-meta">
          <div class="meta-row">
            <span>ID: ${inst.id}</span>
            <span>&#128100; ${user}</span>
          </div>
          <div class="meta-row">
            <span>&#128336; ${started}</span>
            <span>&#9200; ${dur}</span>
          </div>
        </div>
      </div>`;
  }

  function toggleGroup(key) {
    if (collapsedGroups.has(key)) collapsedGroups.delete(key);
    else collapsedGroups.add(key);
    renderList();
  }

  // ── Select & show diagram ──────────────────────────────────────────────────
  async function selectInstance(id) {
    selectedId = id;
    renderList();

    const inst = allInstances.find(i => i.id === id);
    if (!inst) return;

    // Update diagram title
    const title = procKey(inst.processDefinitionId) + '  #' + inst.id;
    document.getElementById('diagram-title').textContent = title +
      (inst.status === 'running' ? '  ⬤ LÄUFT' : inst.status === 'aborted' ? '  ✕ ABBRUCH' : '  ✓ FERTIG');

    // Show detail panel
    document.getElementById('detail-panel').style.display = 'flex';

    await Promise.all([loadDiagram(inst), loadDetailData(inst)]);
  }

  // ── Detail Panel ───────────────────────────────────────────────────────────
  function toggleDetailPanel() {
    detailPanelOpen = !detailPanelOpen;
    const content = document.getElementById('detail-content');
    const btn     = document.getElementById('detail-collapse-btn');
    const panel   = document.getElementById('detail-panel');
    content.style.display = detailPanelOpen ? '' : 'none';
    panel.style.height    = detailPanelOpen ? '' : 'auto';
    btn.textContent = detailPanelOpen ? '▼ einklappen' : '▲ aufklappen';
  }

  function switchDetailTab(tab) {
    currentDetailTab = tab;
    ['vars','tasks','activities'].forEach(t =>
      document.getElementById('dtab-' + t).classList.toggle('active', t === tab));
    if (selectedId) renderDetailContent();
  }

  async function loadDetailData(inst) {
    if (detailCache.has(inst.id)) { renderDetailContent(); return; }

    document.getElementById('detail-content').innerHTML =
      '<div class="empty-state" style="padding:20px"><div class="spinner" style="margin:0 auto;width:20px;height:20px;border-width:2px"></div></div>';

    try {
      const [vR, tR, aR] = await Promise.all([
        apiFetch(`/activiti-rest/service/history/historic-variable-instances?processInstanceId=${inst.id}&size=200`),
        apiFetch(`/activiti-rest/service/history/historic-task-instances?processInstanceId=${inst.id}&sort=startTime&order=asc&size=200`),
        apiFetch(`/activiti-rest/service/history/historic-activity-instances?processInstanceId=${inst.id}&sort=startTime&order=asc&size=200`)
      ]);
      detailCache.set(inst.id, { vars: vR.data, tasks: tR.data, activities: aR.data });
      renderDetailContent();
    } catch(e) {
      document.getElementById('detail-content').innerHTML =
        `<div class="error-msg">Fehler: ${e.message}</div>`;
    }
  }

  function renderDetailContent() {
    const inst = allInstances.find(i => i.id === selectedId);
    if (!inst) return;
    const cache = detailCache.get(inst.id);
    if (!cache) return;
    const container = document.getElementById('detail-content');
    if (currentDetailTab === 'vars')       renderVars(cache.vars, container);
    else if (currentDetailTab === 'tasks') renderTasks(cache.tasks, container);
    else                                   renderActivities(cache.activities, container);
  }

  function esc(s) {
    return String(s ?? '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
  }

  function renderVars(vars, container) {
    if (!vars.length) {
      container.innerHTML = '<div class="empty-state" style="padding:20px">Keine Variablen vorhanden</div>';
      return;
    }
    // Sort by name
    const sorted = [...vars].sort((a,b) => (a.variable?.name||'').localeCompare(b.variable?.name||''));
    const rows = sorted.map(v => {
      const name  = esc(v.variable?.name  ?? v.name  ?? '?');
      const type  = esc(v.variable?.type  ?? v.type  ?? '');
      const value = String(v.variable?.value ?? v.value ?? '');
      const isLong = value.length > 80;
      const vid    = 'v_' + v.id;
      return `<tr>
        <td><span class="var-name">${name}</span></td>
        <td><span class="var-type">${type}</span></td>
        <td><span class="var-value${isLong ? ' long' : ''}" id="${vid}"
          ${isLong ? `onclick="document.getElementById('${vid}').classList.toggle('expanded')" title="Klicken zum Ausklappen"` : ''}
          >${esc(value)}</span></td>
      </tr>`;
    }).join('');
    container.innerHTML = `<table class="var-table">
      <thead><tr><th>Name</th><th>Typ</th><th>Wert</th></tr></thead>
      <tbody>${rows}</tbody></table>`;
  }

  function renderTasks(tasks, container) {
    if (!tasks.length) {
      container.innerHTML = '<div class="empty-state" style="padding:20px">Keine Tasks vorhanden</div>';
      return;
    }
    const rows = tasks.map(t => {
      const done  = !!t.endTime;
      const color = done ? '#6c7086' : '#a6e3a1';
      return `<div class="task-row">
        <div class="task-dot" style="background:${color}"></div>
        <span class="task-name" title="${esc(t.name)}">${esc(t.name || t.taskDefinitionKey || '?')}</span>
        <span class="task-assignee">${t.assignee ? '👤 ' + esc(t.assignee) : ''}</span>
        <span class="task-dur">${t.durationInMillis != null ? parseDuration(t.durationInMillis) : '–'}</span>
      </div>`;
    }).join('');
    container.innerHTML = `<div class="task-list">${rows}</div>`;
  }

  function renderActivities(activities, container) {
    const filtered = activities.filter(a => a.activityType !== 'sequenceFlow');
    if (!filtered.length) {
      container.innerHTML = '<div class="empty-state" style="padding:20px">Kein Verlauf vorhanden</div>';
      return;
    }
    const rows = filtered.map(a => {
      const t = a.activityType || '';
      let iconCls, iconTxt;
      if      (t === 'startEvent')       { iconCls='startEvent';   iconTxt='○'; }
      else if (t.includes('ndEvent'))    { iconCls='endEvent';     iconTxt='●'; }
      else if (t === 'userTask')         { iconCls='userTask';     iconTxt='☑'; }
      else if (t === 'callActivity')     { iconCls='callActivity'; iconTxt='⧉'; }
      else if (t.includes('ateway'))     { iconCls='gateway';      iconTxt='◇'; }
      else                               { iconCls='other';        iconTxt='◎'; }

      const subLink = a.calledProcessInstanceId
        ? `<a href="#" onclick="event.preventDefault();selectInstance('${a.calledProcessInstanceId}')">→ Sub #${a.calledProcessInstanceId}</a>`
        : '';
      const assigneeTxt = a.assignee ? `👤 ${esc(a.assignee)}  ` : '';
      const dur = a.durationInMillis != null ? parseDuration(a.durationInMillis) : '';

      return `<div class="act-row">
        <div class="act-icon ${iconCls}">${iconTxt}</div>
        <div class="act-body">
          <div class="act-name">${esc(a.activityName || a.activityId)}${subLink}</div>
          <div class="act-meta">${assigneeTxt}${formatDate(a.startTime)}</div>
        </div>
        <div class="act-dur">${dur}</div>
      </div>`;
    }).join('');
    container.innerHTML = `<div class="activity-list">${rows}</div>`;
  }

  async function loadDiagram(inst) {
    const img         = document.getElementById('diagram-img');
    const placeholder = document.getElementById('diagram-placeholder');

    img.style.display = 'none';
    placeholder.innerHTML = '<div class="spinner"></div><p>Diagramm wird geladen…</p>';
    placeholder.style.display = 'flex';

    try {
      let path;
      if (inst.status === 'running') {
        // Highlighted diagram with current token
        path = `/activiti-rest/service/runtime/process-instances/${inst.id}/diagram`;
      } else {
        // Plain definition image for historic
        const defId = encodeURIComponent(inst.processDefinitionId);
        path = `/activiti-rest/service/repository/process-definitions/${defId}/image`;
      }

      const c = creds();
      const resp = await fetch(c.host + path, { headers: authHeader() });
      if (!resp.ok) throw new Error(`HTTP ${resp.status}`);

      const blob = await resp.blob();
      const url  = URL.createObjectURL(blob);

      img.onload = () => {
        placeholder.style.display = 'none';
        img.style.display = 'block';
        currentScale = 1.0;
        img.style.transform = 'scale(1)';
        fitToView();
      };
      img.src = url;

    } catch (e) {
      placeholder.innerHTML = `<div class="error-msg">Diagramm konnte nicht geladen werden:<br>${e.message}</div>`;
    }
  }

  // ── Zoom ───────────────────────────────────────────────────────────────────
  function zoom(delta) {
    const img = document.getElementById('diagram-img');
    if (img.style.display === 'none') return;
    if (delta === 0) {
      currentScale = 1.0;
    } else {
      currentScale = Math.max(0.2, Math.min(4.0, currentScale + delta));
    }
    img.style.transform = `scale(${currentScale})`;
  }

  function fitToView() {
    const img      = document.getElementById('diagram-img');
    const viewport = document.getElementById('diagram-viewport');
    if (img.style.display === 'none' || !img.naturalWidth) return;

    const vw = viewport.clientWidth  - 40;
    const vh = viewport.clientHeight - 40;
    const scaleX = vw / img.naturalWidth;
    const scaleY = vh / img.naturalHeight;
    currentScale = Math.min(scaleX, scaleY, 1.0);
    img.style.transform = `scale(${currentScale})`;
  }

  // Mousewheel zoom
  document.getElementById('diagram-viewport').addEventListener('wheel', e => {
    if (e.ctrlKey || e.metaKey) {
      e.preventDefault();
      zoom(e.deltaY < 0 ? 0.1 : -0.1);
    }
  }, { passive: false });

  // ── Auto-refresh (running instances) ───────────────────────────────────────
  function startAutoRefresh() {
    countdown = autoRefreshSec;
    updateRefreshInfo();
    refreshTimer = setInterval(() => {
      countdown--;
      updateRefreshInfo();
      if (countdown <= 0) {
        silentRefreshRunning();
        countdown = autoRefreshSec;
      }
    }, 1000);
  }

  function clearAutoRefresh() {
    if (refreshTimer) { clearInterval(refreshTimer); refreshTimer = null; }
  }

  function updateRefreshInfo() {
    document.getElementById('refresh-info').textContent =
      `Auto-Refresh in ${countdown}s`;
  }

  async function silentRefreshRunning() {
    try {
      const [rResp, hResp] = await Promise.all([
        apiFetch('/activiti-rest/service/runtime/process-instances?size=200'),
        apiFetch('/activiti-rest/service/history/historic-process-instances?size=200&order=desc&sort=processInstanceId')
      ]);

      const runningIds = new Set(rResp.data.map(i => i.id));
      const running = rResp.data.map(i => ({ ...i, status: 'running', isHistoric: false }));
      const historic = hResp.data
        .filter(i => !runningIds.has(i.id))
        .map(i => ({ ...i, status: i.deleteReason ? 'aborted' : 'done', isHistoric: true }));

      allInstances = [...running, ...historic];
      updateBadges();
      renderList();

      // Refresh diagram + details if a running instance is selected
      if (selectedId) {
        const sel = allInstances.find(i => i.id === selectedId);
        if (sel && sel.status === 'running') {
          detailCache.delete(sel.id);  // force reload for running instances
          await Promise.all([loadDiagram(sel), loadDetailData(sel)]);
        }
      }
    } catch (_) { /* silent */ }
  }

  // ── Init ───────────────────────────────────────────────────────────────────
  window.addEventListener('load', () => reload());
</script>
