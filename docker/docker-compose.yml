# =============================================================================
# TestSupportClient — Activiti 6 (Docker Compose)
# =============================================================================
# Stellt den Activiti-6-BPMN-Workflow-Engine-Container bereit, der von den
# JUnit-Tests in testsupport_client (TestSupportViewActivitiTest) verwendet wird.
#
# Zugehoerige Konfiguration in ENE-config.properties:
#   ACTIVITI_URLS = ...::http://localhost:9090   (zweiter Eintrag)
#
# Starten:  docker compose up -d
# Stoppen:  docker compose down
# Logs:     docker compose logs -f activiti
#
# Siehe auch: docker-compose-a5.yml fuer Activiti 5 (Port 9091)
# =============================================================================

name: TestSupportClient

services:

  # ---------------------------------------------------------------------------
  # PostgreSQL-Datenbank fuer Activiti 6
  # ---------------------------------------------------------------------------
  # Verwendet tmpfs (RAM-Disk) statt persistentem Volume:
  #   - Bei jedem Container-Start wird eine frische DB erzeugt
  #   - Ideal fuer Tests, da kein Zustand zwischen Laeufen erhalten bleibt
  # ---------------------------------------------------------------------------
  activiti-db:
    image: postgres:15-alpine
    container_name: TestSupportClient-activiti6-db
    environment:
      POSTGRES_DB: activiti        # Datenbankname, den Activiti erwartet
      POSTGRES_USER: postgres      # Standard-DB-User
      POSTGRES_PASSWORD: postgres  # Standard-DB-Passwort
    tmpfs:
      - /var/lib/postgresql/data   # RAM-Disk: kein persistenter Speicher
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 10

  # ---------------------------------------------------------------------------
  # Activiti 6.0.0 — BPMN Workflow Engine (Tomcat 9 + JDK 11)
  # ---------------------------------------------------------------------------
  # REST-API:        http://localhost:9090/activiti-rest/service/
  # Activiti-App:    http://localhost:9090/activiti-app  (kermit/kermit)
  # Process Explorer: http://localhost:9090/process-explorer
  # SMTP-Sink:       Port 2525 (faengt E-Mails ab, die Activiti-Prozesse senden)
  #
  # Port konfigurierbar via Umgebungsvariable ACTIVITI_PORT (Standard: 9090)
  # ---------------------------------------------------------------------------
  activiti:
    build: .
    image: activiti6:latest
    container_name: TestSupportClient-activiti6
    ports:
      - "${ACTIVITI_PORT:-9090}:8080"  # Activiti REST + App (Tomcat)
      - "2525:25"                      # SMTP-Sink fuer Test-E-Mails
    depends_on:
      activiti-db:
        condition: service_healthy     # Startet erst wenn DB bereit ist
    environment:
      JAVA_OPTS: "-Xmx512m"           # Speicherlimit fuer die JVM
